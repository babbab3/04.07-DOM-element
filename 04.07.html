<!--// 5-p31 문서 객체 속성 조작(표준시)
<!DOCTYPE html>
<html>
<head>
    <title>Document Object Model</title>
    <script>
        // 이벤트를 연결합니다.
        window.onload = function () {
            // 문서 객체를 선택합니다.
            let clock = document.getElementById('clock');
            // 1초마다 함수를 실행합니다.
            setInterval(function () {
              let now = new Date();
              clock.innerHTML = now.toString();
            }, 1000);
        };
    </script>
</head>
<body>
  <h1 id="clock"></h1>
</body>
</html>

// 6-p22 스스타일 조작
<!DOCTYPE html>
<html>
<head>
    <title>Document Object Model</title>
    <script src="https://code.jquery.com/jquery-3.6.4.js"></script> 
    <script> 
         $(document).ready(function () { 
           // 스타일을 적용합니다. 
           $('.box').css('float', 'left'); 
           $('.box').css('margin', 10); 
           $('.box').css('width', 100); 
           $('.box').css('height', 100); 
           $('.box').css('backgroundColor', 'red'); 
         }); 
     </script> 
<body> 
     <div class="box"></div> 
     <div class="box"></div> 
     ㄴ<div class="box"></div>
</body>
</html>
